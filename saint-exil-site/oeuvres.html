<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Œuvres — Étienne De Saint-Exil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="hero">
    <div class="bg-glow bg-glow-left"></div>
    <div class="bg-glow bg-glow-right"></div>

    <header class="navbar">
      <div class="brand">
        <img src="ecusson.png" alt="Logo Étienne De Saint-Exil">
        <div class="brand-text">
          <h2>Étienne De Saint-Exil</h2>
          <span>Écrivain</span>
        </div>
      </div>

      <button class="menu-btn" aria-label="Ouvrir le menu">
        <span></span><span></span>
      </button>

      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="biography.html">Biographie</a>
        <a class="active" href="oeuvres.html">Œuvres</a>
        <a href="actualite.html">Actualité</a>
        <a href="newsletter.html">Newsletter</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="hero-content">
      <div class="works-intro">
        <h2>ŒUVRES</h2>
        <h1>Les Livres d'Étienne De Saint-Exil</h1>
        <p>Découvrez les ouvrages, réflexions et univers littéraires de l'auteur à travers ses publications.</p>
        <div class="section-divider"></div>
      </div>
    </section>
  </main>

  <section class="books-section">
    <div class="books-grid" id="booksGrid"></div>
  </section>

  <div class="book-modal" id="bookModal" aria-hidden="true">
    <div class="book-modal-backdrop" data-close-modal></div>

    <div class="book-modal-content" role="dialog" aria-modal="true">
      <button class="book-modal-close" type="button" aria-label="Fermer la fiche du livre">×</button>

      <img class="book-modal-cover" src="" alt="" />

      <div class="book-modal-info">
        <span class="section-label">ŒUVRE</span>
        <h2 id="bookModalTitle"></h2>
        <p id="bookModalSummary"></p>
        <a id="bookModalBuy" class="book-buy-btn" href="#" target="_blank" rel="noopener">Acheter le livre</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
